<html>
<head>
<title>Any Time applet</title>
</head>
<body>
<p>
<table border=1>
 <tr>
  <th>Adelaide</th>
  <th>Chicago</th>
 </tr>
 <tr>
  <td>
   <applet code="AnyTime.class" width=75 height=25>
   <param name="offset" value="-1">
   <param name="update" value="1">
   <param name="fontname" value="Courier">
   <param name="fontsize" value="14">
   <!param name="bgcolor" value="#abcdab">
   <param name="bgcolor" value="#ffffff">
   <param name="fgcolor" value="#000000">
   </applet>
  </td>
  <td>
   <applet code="AnyTime.class" width=75 height=25>
   <param name="offset" value="-16">
   <param name="update" value="1">
   <param name="fontname" value="Courier">
   <param name="fontsize" value="14">
   <!param name="bgcolor" value="#cdabcd">
   <param name="bgcolor" value="#ffffff">
   <param name="fgcolor" value="#000000">
   </applet>
  </td>
 </tr>
</table>
</p>
</body>
</html>
