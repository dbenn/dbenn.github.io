<!DOCTYPE html>
<html>
  <head>
    <title>Olympic Quiz</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="dyn/jquery-ui-1.12.0.css">
    <script src="dyn/jquery-1.12.4.js"></script>
    <script src="dyn/jquery-ui-1.12.0.js"></script>
    <script src="dyn/questions.js"></script>
    <style>
    legend {
      font-size: 24px; 
    }
    </style>
  </head>
  <body>
    <div id="question">
      <fieldset id="qfields"/>
    </div>

    <canvas id="canvas"/>

    <script>
var sections = ["History", "2016", "Athletes", "Countries", "General"];
var colors = ["#F84", "#8F4", "#48F", "#F8F", "#A9A9A9"];


var selectionIndex = 0;

function setQuestion() {
    $("#qfields").empty();

    topic = sections[selectionIndex];
    index = Math.floor(Math.random() * questions[topic].length)
    question = questions[topic][index];

    addLegend(question["Q"]);
    for (i=0;i<question["opts"].length;i++) {
        addOption(i, question["opts"][i]);
    }

    $("#qfields").append('<input type="text" id="result" size="10"/>');
    $(".qsel").change(function() {
      id = $(this).attr("id");
      result = $('label[for='+id+']').text();
      if (result == question["A"]) {
        result = "Correct!";
      } else {
        result = "Incorrect";
      }
      $("#result").val(result);
    });
}

function addLegend(legend) {
    $("#qfields").append('<legend>'+legend+'</legend>');
}

function addOption(index, label) {
    id = '"qopt'+index+'"';
    $("#qfields").append('<input class="qsel" type="radio" name="qopt" id='+id+'/>');
    $("#qfields").append('&nbsp;');
    $("#qfields").append('<label for='+id+'>'+label+'</label>');
    $("#qfields").append('&nbsp;');
    $("#qfields").append('&nbsp;');
    $("#qfields").append('&nbsp;');
    $("#qfields").append('&nbsp;');
}

// Wheel of fortune code adapted from http://raksy.dyndns.org/wheel.html

function repaint(angle) {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
    var r = Math.min(innerWidth, innerHeight) / 2.5;
    var cx = innerWidth/2, cy = innerHeight/2-30;
    var ctx = canvas.getContext("2d");
    var g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    g.addColorStop(0, "rgba(0,0,0,0)");
    g.addColorStop(1, "rgba(0,0,0,0.5)");
    var selected = (Math.floor((- 0.2 - angle) * sections.length / (2*Math.PI))
                    % sections.length);
    if (selected < 0) selected += sections.length;
    for (var i=0; i<sections.length; i++) {
        var a0 = angle + 2*Math.PI*i/sections.length;
        var a1 = a0 + 2*Math.PI/(i == 0 ? 1 : sections.length);
        var a = angle + 2*Math.PI*(i+0.5)/sections.length;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, a0, a1, false);
        ctx.fillStyle = colors[i % sections.length];
        ctx.fill();
        ctx.fillStyle = g;
        ctx.fill();
        ctx.save();
        if (i == selected) {
            ctx.fillStyle = "#FFF";
            ctx.shadowColor = "#FFF";
            ctx.shadowBlur = r/20;
            selectionIndex = i;
        } else {
            ctx.fillStyle = "#AAA";
            ctx.shadowColor = "#000";
            ctx.shadowBlur = r/100;
        }
        ctx.font = "bold " + r/sections.length*0.6 + "px serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.translate(cx, cy);
        ctx.rotate(a);
        ctx.fillText(sections[i], r*0.62, 0);
        ctx.restore();
    }
    ctx.shadowOffsetX = r/80;
    ctx.shadowOffsetY = r/80;
    ctx.shadowBlur = r/40;
    ctx.shadowColor = "rgba(0,0,0,0.5)";
    ctx.beginPath();
    ctx.arc(cx, cy, r*1.025, 0, 2*Math.PI, true);
    ctx.arc(cx, cy, r*0.975, 0, 2*Math.PI, false);
    ctx.fillStyle = "#444";
    ctx.fill();
    ctx.shadowOffsetX = r/40;
    ctx.shadowOffsetY = r/40;
    g = ctx.createRadialGradient(cx-r/7, cy-r/7, 0, cx, cy, r/3);
    g.addColorStop(0, "#FFF");
    g.addColorStop(0.2, "#F44");
    g.addColorStop(1, "#811");
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(cx, cy, r/3.5, 0, 2*Math.PI, false);
    ctx.fill();
    ctx.translate(cx, cy);
    ctx.rotate(Math.PI - 0.2);
    ctx.beginPath();
    ctx.moveTo(- r*1.1, - r*0.05);
    ctx.lineTo(- r*0.9, 0);
    ctx.lineTo(- r*1.1, r*0.05);
    ctx.fillStyle = "#F44";
    ctx.fill();
}

var angle = 0;

function spin(speed, duration) {
    var start = (new Date).getTime();
    function frame() {
        var now = (new Date).getTime();
        var t = (now - start) / duration;
        if (t > 1) {
            t = 1;
            setQuestion();
        }
        angle += speed * (1 - t);
        repaint(angle);
        if (t < 1) setTimeout(frame, 10);
    }
    setTimeout(frame, 10);
}

canvas.onmousedown = function() {
    spin(0.2, 5000);
};

repaint(angle);
setQuestion();

setInterval(function() {
    if (canvas.width != innerWidth || canvas.height != innerHeight) {
        repaint(angle);
    }
}, 10);
    </script>
  </body>
</html>
