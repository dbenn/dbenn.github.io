<html>
 <head>
 <title>Simple ECMAScript Example</title>
  <script language = "JavaScript">
   <!-- Hide the code from non-compliant browsers.

   function doSqrt(form) {
   form.result.value = Math.sqrt(form.num.value);
   }
   // -->
  </script>
 </head>
 <body>
 <h5>Simple ECMAScript example which displays the square root of an entered number.</h5>
 <form name="sqrtForm">
 Enter Number: <input type="text" name="num" value="" size=7>
 <input type="button" value="Calculate"
 onClick="doSqrt(document.sqrtForm)">
 <input type="text" name="result" value="" size=7>
 </form>
 </body>
</html>
